name: Update Market Data

on:
  schedule:
    # 22:00 UTC weekdays (after US close)
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: market-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch latest market data
        run: node scripts/fetch-market-data.mjs
        continue-on-error: true

      - name: Commit & push if changed
        run: |
          if [[ -n "$(git status --porcelain public/data/market.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public/data/market.json
            git commit -m "chore: refresh market data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to commit."
          fi
